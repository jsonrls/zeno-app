<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="head" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="eyeWhite" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>
    <radialGradient id="pupil" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#010101"/>
    </radialGradient>
    <linearGradient id="muzzle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="chest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="30" y="30" width="1020" height="1020" rx="230" fill="url(#bg)"/>

  <!-- soft shadow under head -->
  <ellipse cx="540" cy="870" rx="320" ry="60" fill="#4c1d95" opacity="0.18"/>

  <!-- chest/body -->
  <path d="M 260 900 Q 260 760 540 740 Q 820 760 820 900 L 820 940 Q 820 1000 750 1000 L 330 1000 Q 260 1000 260 940 Z" fill="url(#chest)"/>
  <path d="M 470 900 q 35 30 70 0" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 400 930 q 35 30 70 0" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 610 930 q 35 30 70 0" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- ears -->
  <ellipse cx="255" cy="290" rx="95" ry="90" fill="url(#ear)"/>
  <ellipse cx="825" cy="290" rx="95" ry="90" fill="url(#ear)"/>
  <ellipse cx="255" cy="295" rx="52" ry="50" fill="#4c1d95" opacity="0.55"/>
  <ellipse cx="825" cy="295" rx="52" ry="50" fill="#4c1d95" opacity="0.55"/>

  <!-- head -->
  <path d="M 170 470
           C 170 260 340 180 540 200
           C 740 180 910 260 910 470
           C 910 640 830 760 540 780
           C 250 760 170 640 170 470 Z" fill="url(#head)"/>

  <!-- eye sockets (white) -->
  <ellipse cx="395" cy="490" rx="150" ry="155" fill="url(#eyeWhite)"/>
  <ellipse cx="685" cy="490" rx="150" ry="155" fill="url(#eyeWhite)"/>

  <!-- pupils -->
  <circle cx="395" cy="510" r="82" fill="url(#pupil)"/>
  <circle cx="685" cy="510" r="82" fill="url(#pupil)"/>

  <!-- highlights -->
  <circle cx="425" cy="480" r="20" fill="#FFFFFF"/>
  <circle cx="715" cy="480" r="20" fill="#FFFFFF"/>

  <!-- smile crescents under eyes -->
  <path d="M 350 565 Q 395 605 440 565" stroke="#6d28d9" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M 640 565 Q 685 605 730 565" stroke="#6d28d9" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- muzzle -->
  <path d="M 400 640
           C 400 590 460 560 540 560
           C 620 560 680 590 680 640
           C 690 700 660 760 540 770
           C 420 760 390 700 400 640 Z" fill="url(#muzzle)"/>

  <!-- nostrils -->
  <ellipse cx="505" cy="640" rx="16" ry="24" fill="#4c1d95"/>
  <ellipse cx="575" cy="640" rx="16" ry="24" fill="#4c1d95"/>

  <!-- mouth -->
  <path d="M 500 705 Q 540 735 580 705" stroke="#6d28d9" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- front teeth -->
  <rect x="522" y="712" width="36" height="30" rx="6" fill="#FFFDF7"/>
  <line x1="540" y1="712" x2="540" y2="742" stroke="#e2d9ff" stroke-width="3"/>
</svg>
